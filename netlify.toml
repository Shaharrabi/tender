# Netlify build configuration for Expo static web export

[build]
  # Write a .env.local so Expo's Metro bundler injects the vars at compile time.
  # Netlify sets [build.environment] in the shell, but Expo reads .env.local files.
  command = """
echo "EXPO_PUBLIC_SUPABASE_URL=$EXPO_PUBLIC_SUPABASE_URL" > .env.local && \
echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=$EXPO_PUBLIC_SUPABASE_ANON_KEY" >> .env.local && \
npm install && \
npx expo export --platform web
"""
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # EXPO_PUBLIC_SUPABASE_URL and EXPO_PUBLIC_SUPABASE_ANON_KEY must be set
  # in the Netlify dashboard (Site settings > Environment variables).
  # Do NOT hardcode credentials here.

# ─── Security Headers ───────────────────────────────────
# Protects against common web attacks (XSS, clickjacking, MIME sniffing)
[[headers]]
  for = "/games/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.anthropic.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; media-src 'self' data: blob:; frame-ancestors 'self';"

[[headers]]
  for = "/*"
  [headers.values]
    # Force HTTPS for 1 year (including subdomains)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Prevent embedding in iframes (clickjacking protection)
    X-Frame-Options = "DENY"
    # Prevent MIME-type sniffing attacks
    X-Content-Type-Options = "nosniff"
    # Control referrer information leakage
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Restrict browser permissions (camera, mic, location, etc.)
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    # Content Security Policy — allow self + Supabase + Anthropic
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.anthropic.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; media-src 'self' data: blob:; frame-ancestors 'none';"

# SPA fallback — only for routes without a pre-rendered HTML file.
# Expo static export generates per-route HTML files; Netlify serves
# those automatically when they exist (e.g. /partner → /partner.html).
# This catch-all handles deep links that don't have a matching file.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
