# Netlify build configuration for Expo static web export

[build]
  # Write a .env.local so Expo's Metro bundler injects the vars at compile time.
  # Netlify sets [build.environment] in the shell, but Expo reads .env.local files.
  command = """
echo "EXPO_PUBLIC_SUPABASE_URL=$EXPO_PUBLIC_SUPABASE_URL" > .env.local && \
echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=$EXPO_PUBLIC_SUPABASE_ANON_KEY" >> .env.local && \
npm install && \
npx expo export --platform web
"""
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  EXPO_PUBLIC_SUPABASE_URL = "https://qwqclhzezyzeflxrtfjy.supabase.co"
  EXPO_PUBLIC_SUPABASE_ANON_KEY = "sb_publishable_X44nRh0JlS952CarvKJfcg_WAJLktxq"

# ─── Security Headers ───────────────────────────────────
# Protects against common web attacks (XSS, clickjacking, MIME sniffing)
[[headers]]
  for = "/*"
  [headers.values]
    # Force HTTPS for 1 year (including subdomains)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Prevent embedding in iframes (clickjacking protection)
    X-Frame-Options = "DENY"
    # Prevent MIME-type sniffing attacks
    X-Content-Type-Options = "nosniff"
    # Control referrer information leakage
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Restrict browser permissions (camera, mic, location, etc.)
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    # Content Security Policy — allow self + Supabase + Anthropic
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.anthropic.com; img-src 'self' data: blob: https:; font-src 'self' data:; media-src 'self' data: blob:; frame-ancestors 'none';"

# SPA fallback — route all requests to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
