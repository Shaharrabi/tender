<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Couple Portal · Pairing Fearful+Fearful</title>
<style>
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.95}}
@keyframes flicker{0%,100%{opacity:.6}45%{opacity:1}70%{opacity:.8}}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(3px,-3px)}}
@keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes unfurl{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
@keyframes glow{0%,100%{opacity:.07}50%{opacity:.25}}
@keyframes sway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(4deg)}}
@keyframes rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes expand{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
html,body{margin:0;padding:0;background:#FDF6F0;display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%}
svg{display:block;width:100%;max-width:600px;height:auto}
.ln line{stroke:#B9AAA0;stroke-width:.35;opacity:.06}
</style>
</head>
<body>
<svg viewBox="0 0 460 240" xmlns="http://www.w3.org/2000/svg">
<rect width="460" height="240" fill="#FDF6F0"/>
<g class="ln"><line x1="0" y1="18" x2="460" y2="18"/><line x1="0" y1="32" x2="460" y2="32"/><line x1="0" y1="46" x2="460" y2="46"/><line x1="0" y1="60" x2="460" y2="60"/><line x1="0" y1="74" x2="460" y2="74"/><line x1="0" y1="88" x2="460" y2="88"/><line x1="0" y1="102" x2="460" y2="102"/><line x1="0" y1="116" x2="460" y2="116"/><line x1="0" y1="130" x2="460" y2="130"/><line x1="0" y1="144" x2="460" y2="144"/><line x1="0" y1="158" x2="460" y2="158"/><line x1="0" y1="172" x2="460" y2="172"/><line x1="0" y1="186" x2="460" y2="186"/><line x1="0" y1="200" x2="460" y2="200"/><line x1="0" y1="214" x2="460" y2="214"/></g>

<!-- open field but disturbed: irregular, contracted lines -->
<g opacity=".18"><path d="M0 200 Q60 188 120 196 Q180 204 240 190 Q320 174 400 186 Q430 192 460 188" fill="none" stroke="#8FA8BC" stroke-width="1.4" stroke-linecap="round"/><path d="M0 214 Q60 204 122 210 Q182 216 240 204 Q320 190 400 200 Q432 206 460 202" fill="none" stroke="#8FA8BC" stroke-width=".9" stroke-linecap="round" opacity=".6"/></g>

<!-- LEFT: fearful-avoidant A — plum body, leaning IN but arms slightly crossed -->
<path d="M76 198 Q56 174 54 148 Q52 124 64 102 Q76 80 94 74 Q112 68 126 82 Q140 96 142 122 Q144 148 128 174 Q114 196 94 204Z" fill="#927585" opacity=".82" style="animation:breathe 4.5s ease-in-out infinite;transform-origin:98px 138px"/>
<ellipse cx="96" cy="66" rx="20" ry="24" fill="none" stroke="#514543" stroke-width="1"/>
<path d="M82 54 Q92 44 98 42 Q104 40 108 48" fill="none" stroke="#514543" stroke-width=".9" stroke-linecap="round" opacity=".6"/>
<!-- conflicted arms: one reaching, one crossing back -->
<!-- ambivalence: small in/out arrows at chest -->
<path d="M118 130 Q126 124 132 128" fill="none" stroke="#927585" stroke-width="3" stroke-linecap="round" opacity=".5" style="animation:float 2.5s ease-in-out infinite"/>
<path d="M126 142 Q118 148 114 144" fill="none" stroke="#927585" stroke-width="3" stroke-linecap="round" opacity=".4" style="animation:float 2.5s ease-in-out infinite;animation-delay:-.8s"/>

<!-- RIGHT: fearful-avoidant B — mustard, same conflicted pose, slightly different angle -->
<path d="M310 198 Q330 174 332 148 Q334 124 322 102 Q310 80 292 74 Q274 68 260 82 Q246 96 244 122 Q242 148 258 174 Q272 196 292 204Z" fill="#D4A843" opacity=".78" style="animation:breathe 4.5s ease-in-out infinite;animation-delay:-2s;transform-origin:288px 138px"/>
<ellipse cx="290" cy="66" rx="20" ry="24" fill="none" stroke="#514543" stroke-width="1"/>
<path d="M278 54 Q286 44 292 42 Q298 40 302 48" fill="none" stroke="#514543" stroke-width=".9" stroke-linecap="round" opacity=".6"/>

<!-- the gap between them: hot and cold simultaneously -->
<ellipse cx="193" cy="138" rx="28" ry="34" fill="none" stroke="#D4A843" stroke-width=".6" stroke-dasharray="3 5" opacity=".4" style="animation:pulse 3s ease-in-out infinite"/>
<!-- 16 pairings count indicator -->
<rect x="370" y="32" width="68" height="4" rx="2" fill="#D6CEBF"/>
<rect x="370" y="32" width="60" height="4" rx="2" fill="#927585" opacity=".5"/>

<!-- pairing badge -->
<rect x="130" y="18" width="126" height="15" rx="5" fill="#927585" opacity=".15"/>
</svg>
</body>
</html>
