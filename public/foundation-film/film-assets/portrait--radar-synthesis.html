<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Portrait · Radar Chart + Synthesis Card</title>
<style>
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.95}}
@keyframes flicker{0%,100%{opacity:.6}45%{opacity:1}70%{opacity:.8}}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(3px,-3px)}}
@keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes unfurl{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
@keyframes glow{0%,100%{opacity:.07}50%{opacity:.25}}
@keyframes sway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(4deg)}}
@keyframes rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes expand{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
html,body{margin:0;padding:0;background:#FDF6F0;display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%}
svg{display:block;width:100%;max-width:600px;height:auto}
.ln line{stroke:#B9AAA0;stroke-width:.35;opacity:.06}
</style>
</head>
<body>
<svg viewBox="0 0 460 280" xmlns="http://www.w3.org/2000/svg">
<rect width="460" height="280" fill="#FDF6F0"/>
<g class="ln"><line x1="0" y1="18" x2="460" y2="18"/><line x1="0" y1="34" x2="460" y2="34"/><line x1="0" y1="50" x2="460" y2="50"/><line x1="0" y1="66" x2="460" y2="66"/><line x1="0" y1="82" x2="460" y2="82"/><line x1="0" y1="98" x2="460" y2="98"/><line x1="0" y1="114" x2="460" y2="114"/><line x1="0" y1="130" x2="460" y2="130"/><line x1="0" y1="146" x2="460" y2="146"/><line x1="0" y1="162" x2="460" y2="162"/><line x1="0" y1="178" x2="460" y2="178"/><line x1="0" y1="194" x2="460" y2="194"/><line x1="0" y1="210" x2="460" y2="210"/><line x1="0" y1="226" x2="460" y2="226"/><line x1="0" y1="242" x2="460" y2="242"/><line x1="0" y1="258" x2="460" y2="258"/></g>

<!-- LEFT: Radar chart — 5 axis pentagon -->
<!-- Outer pentagon: max values -->
<polygon points="140,30 196,70 176,136 104,136 84,70" fill="none" stroke="#D6CEBF" stroke-width=".8" opacity=".6"/>
<!-- Mid pentagon -->
<polygon points="140,52 174,80 162,122 118,122 106,80" fill="none" stroke="#D6CEBF" stroke-width=".5" opacity=".35"/>
<!-- Data polygon: user scores — mustard fill -->
<polygon points="140,44 182,78 168,128 112,128 98,78" fill="#D4A843" opacity=".14" style="animation:breathe 6s ease-in-out infinite"/>
<polygon points="140,44 182,78 168,128 112,128 98,78" fill="none" stroke="#D4A843" stroke-width="1.1" opacity=".55" style="animation:pulse 4s ease-in-out infinite"/>
<!-- Axis dots -->
<circle cx="140" cy="44" r="3" fill="#D4A843" opacity=".75"/>
<circle cx="182" cy="78" r="3" fill="#E3AFB7" opacity=".7"/>
<circle cx="168" cy="128" r="3" fill="#8FA8BC" opacity=".7"/>
<circle cx="112" cy="128" r="3" fill="#9DAA95" opacity=".7"/>
<circle cx="98" cy="78" r="3" fill="#927585" opacity=".7"/>
<!-- Labels -->
<!-- Center label -->
<!-- RIGHT: Cross-assessment synthesis card -->
<rect x="220" y="20" width="228" height="248" rx="10" fill="#FDF6F0" stroke="#D6CEBF" stroke-width=".7"/>
<!-- primary dynamic -->
<rect x="230" y="48" width="206" height="26" rx="5" fill="#E3AFB7" opacity=".15"/>
<!-- converging patterns -->
<!-- contradictions -->
<!-- strengths -->
<rect x="230" y="166" width="206" height="22" rx="5" fill="#9DAA95" opacity=".13"/>
<!-- growth ceiling -->
<rect x="234" y="208" width="180" height="4" rx="2" fill="#D6CEBF"/>
<rect x="234" y="208" width="144" height="4" rx="2" fill="#D4A843" opacity=".55"/>
<!-- Nuance note -->
<rect x="230" y="234" width="206" height="24" rx="5" fill="#7294D4" opacity=".07"/>
</svg>
</body>
</html>
