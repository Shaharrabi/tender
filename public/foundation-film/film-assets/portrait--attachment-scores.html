<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Portrait · Attachment Style + Composite Scores</title>
<style>
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.95}}
@keyframes flicker{0%,100%{opacity:.6}45%{opacity:1}70%{opacity:.8}}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(3px,-3px)}}
@keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes unfurl{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
@keyframes glow{0%,100%{opacity:.07}50%{opacity:.25}}
@keyframes sway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(4deg)}}
@keyframes rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes expand{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
html,body{margin:0;padding:0;background:#FDF6F0;display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%}
svg{display:block;width:100%;max-width:600px;height:auto}
.ln line{stroke:#B9AAA0;stroke-width:.35;opacity:.06}
</style>
</head>
<body>
<svg viewBox="0 0 460 280" xmlns="http://www.w3.org/2000/svg">
<rect width="460" height="280" fill="#FDF6F0"/>
<g class="ln"><line x1="0" y1="18" x2="460" y2="18"/><line x1="0" y1="34" x2="460" y2="34"/><line x1="0" y1="50" x2="460" y2="50"/><line x1="0" y1="66" x2="460" y2="66"/><line x1="0" y1="82" x2="460" y2="82"/><line x1="0" y1="98" x2="460" y2="98"/><line x1="0" y1="114" x2="460" y2="114"/><line x1="0" y1="130" x2="460" y2="130"/><line x1="0" y1="146" x2="460" y2="146"/><line x1="0" y1="162" x2="460" y2="162"/><line x1="0" y1="178" x2="460" y2="178"/><line x1="0" y1="194" x2="460" y2="194"/><line x1="0" y1="210" x2="460" y2="210"/><line x1="0" y1="226" x2="460" y2="226"/><line x1="0" y1="242" x2="460" y2="242"/><line x1="0" y1="258" x2="460" y2="258"/></g>

<!-- LEFT: large portrait figure — blush/anxious-preoccupied example -->
<path d="M72 256 Q50 226 48 192 Q46 160 60 130 Q74 100 96 90 Q118 80 136 94 Q154 108 156 140 Q158 172 142 208 Q126 242 102 260Z" fill="#E3AFB7" opacity=".82" style="animation:breathe 5.5s ease-in-out infinite;transform-origin:102px 175px"/>
<g opacity=".2" stroke="#FDF6F0" stroke-width="3" stroke-linecap="round">
<path d="M50 140 Q98 132 154 138"/><path d="M48 156 Q97 149 155 154"/><path d="M48 172 Q97 166 154 170"/><path d="M49 188 Q97 182 152 186"/><path d="M51 204 Q97 198 150 202"/>
</g>
<ellipse cx="100" cy="78" rx="26" ry="30" fill="none" stroke="#514543" stroke-width="1.1" transform="rotate(5 100 78)"/>
<path d="M82 64 Q92 52 102 50 Q112 48 118 58" fill="none" stroke="#514543" stroke-width="1" stroke-linecap="round" opacity=".65"/>
<!-- small heart: the need underneath -->
<g style="animation:pulse 2s ease-in-out infinite;transform-origin:192px 144px">
<path d="M189 144 Q193 137 198 144 Q193 152 189 144Z" fill="#E3AFB7" opacity=".8"/>
</g>

<!-- RIGHT: portrait info panel -->
<!-- Style name badge -->
<rect x="210" y="30" width="230" height="28" rx="8" fill="#E3AFB7" opacity=".18"/>
<!-- portrait narrative text lines -->
<!-- composite score bars -->
<g opacity=".75">
<rect x="210" y="118" width="220" height="4" rx="2" fill="#D6CEBF"/>
<rect x="210" y="118" width="142" height="4" rx="2" fill="#E3AFB7" opacity=".7"/>
<rect x="210" y="142" width="220" height="4" rx="2" fill="#D6CEBF"/>
<rect x="210" y="142" width="178" height="4" rx="2" fill="#D4A843" opacity=".65"/>
<rect x="210" y="166" width="220" height="4" rx="2" fill="#D6CEBF"/>
<rect x="210" y="166" width="110" height="4" rx="2" fill="#9DAA95" opacity=".7"/>
<rect x="210" y="190" width="220" height="4" rx="2" fill="#D6CEBF"/>
<rect x="210" y="190" width="88" height="4" rx="2" fill="#8FA8BC" opacity=".65"/>
<rect x="210" y="214" width="220" height="4" rx="2" fill="#D6CEBF"/>
<rect x="210" y="214" width="160" height="4" rx="2" fill="#927585" opacity=".6"/>
<rect x="210" y="238" width="220" height="4" rx="2" fill="#D6CEBF"/>
<rect x="210" y="238" width="124" height="4" rx="2" fill="#C9876A" opacity=".6"/>
</g>

<!-- growth edge -->
<rect x="210" y="252" width="230" height="16" rx="5" fill="#D4A843" opacity=".12"/>
</svg>
</body>
</html>
