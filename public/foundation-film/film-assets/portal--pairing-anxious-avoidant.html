<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Couple Portal · Pairing Anxious+Dismissive</title>
<style>
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.95}}
@keyframes flicker{0%,100%{opacity:.6}45%{opacity:1}70%{opacity:.8}}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(3px,-3px)}}
@keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes unfurl{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
@keyframes glow{0%,100%{opacity:.07}50%{opacity:.25}}
@keyframes sway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(4deg)}}
@keyframes rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes expand{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
html,body{margin:0;padding:0;background:#FDF6F0;display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%}
svg{display:block;width:100%;max-width:600px;height:auto}
.ln line{stroke:#B9AAA0;stroke-width:.35;opacity:.06}
</style>
</head>
<body>
<svg viewBox="0 0 300 240" xmlns="http://www.w3.org/2000/svg">
<rect width="300" height="240" fill="#FDF6F0"/>
<g class="ln"><line x1="0" y1="18" x2="300" y2="18"/><line x1="0" y1="32" x2="300" y2="32"/><line x1="0" y1="46" x2="300" y2="46"/><line x1="0" y1="60" x2="300" y2="60"/><line x1="0" y1="74" x2="300" y2="74"/><line x1="0" y1="88" x2="300" y2="88"/><line x1="0" y1="102" x2="300" y2="102"/><line x1="0" y1="116" x2="300" y2="116"/><line x1="0" y1="130" x2="300" y2="130"/><line x1="0" y1="144" x2="300" y2="144"/><line x1="0" y1="158" x2="300" y2="158"/><line x1="0" y1="172" x2="300" y2="172"/><line x1="0" y1="186" x2="300" y2="186"/><line x1="0" y1="200" x2="300" y2="200"/><line x1="0" y1="214" x2="300" y2="214"/></g>

<!-- open field beneath: the shared ground -->
<g opacity=".18"><path d="M0 208 Q60 198 120 205 Q180 212 240 200 Q270 195 300 198" fill="none" stroke="#8FA8BC" stroke-width="1.4" stroke-linecap="round"/><path d="M0 220 Q60 212 122 218 Q182 224 240 213 Q270 208 300 210" fill="none" stroke="#8FA8BC" stroke-width=".9" stroke-linecap="round" opacity=".65"/></g>

<!-- ANXIOUS: blush, leaning forward, arm reaching -->
<path d="M56 200 Q38 178 36 154 Q34 132 46 112 Q58 92 74 86 Q90 80 102 92 Q114 104 116 128 Q118 152 104 176 Q92 198 74 206Z" fill="#E3AFB7" opacity=".82" style="animation:breathe 4s ease-in-out infinite;transform-origin:76px 143px"/>
<ellipse cx="74" cy="78" rx="20" ry="24" fill="none" stroke="#514543" stroke-width="1"/>
<path d="M60 66 Q70 56 76 54 Q82 52 86 60" fill="none" stroke="#514543" stroke-width=".9" stroke-linecap="round" opacity=".6"/>
<!-- reaching arm -->
<!-- panic dot: the desperate need -->
<g style="animation:pulse 1.8s ease-in-out infinite"><circle cx="152" cy="122" r="5" fill="#E3AFB7" opacity=".5"/></g>

<!-- DISMISSIVE-AVOIDANT: navy, leaning away, arms self-hugging -->
<path d="M244 200 Q262 178 264 154 Q266 132 254 112 Q242 92 226 86 Q210 80 198 92 Q186 104 184 128 Q182 152 196 176 Q208 198 226 206Z" fill="#7294D4" opacity=".82" style="animation:breathe 5s ease-in-out infinite;animation-delay:-2s;transform-origin:224px 143px" transform="rotate(-6 224 143)"/>
<g opacity=".2" stroke="#FDF6F0" stroke-width="2.2" stroke-linecap="round"><path d="M186 124 Q210 118 262 122"/><path d="M184 138 Q209 133 263 136"/><path d="M185 152 Q209 147 262 150"/></g>
<ellipse cx="224" cy="78" rx="20" ry="24" fill="none" stroke="#514543" stroke-width="1" transform="rotate(-6 224 78)"/>
<!-- arms self-crossed -->

<!-- the gap between them: the pursue-distance gap -->
<path d="M148 150 Q166 140 184 150" fill="none" stroke="#D6CEBF" stroke-width=".8" stroke-dasharray="2 4" opacity=".45"/>
<!-- cycle arrows -->
<path d="M128 118 Q150 108 172 118" fill="none" stroke="#B9AAA0" stroke-width=".7" stroke-dasharray="2 3" opacity=".4"/>
<path d="M172 158 Q150 168 128 158" fill="none" stroke="#B9AAA0" stroke-width=".7" stroke-dasharray="2 3" opacity=".4"/>

<!-- pairing badge -->
<rect x="96" y="16" width="108" height="16" rx="5" fill="#E3AFB7" opacity=".15"/>
</svg>
</body>
</html>
