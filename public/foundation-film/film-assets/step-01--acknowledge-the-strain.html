<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Step 1 · Acknowledge the Strain</title>
<style>
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.95}}
@keyframes flicker{0%,100%{opacity:.6}45%{opacity:1}70%{opacity:.8}}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(3px,-3px)}}
@keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes unfurl{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
@keyframes glow{0%,100%{opacity:.07}50%{opacity:.25}}
@keyframes sway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(4deg)}}
@keyframes rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes expand{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
html,body{margin:0;padding:0;background:#FDF6F0;display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%}
svg{display:block;width:100%;max-width:600px;height:auto}
.ln line{stroke:#B9AAA0;stroke-width:.35;opacity:.06}
</style>
</head>
<body>
<svg viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg">
<rect width="300" height="220" fill="#FDF6F0"/>
<g class="ln"><line x1="0" y1="18" x2="300" y2="18"/><line x1="0" y1="32" x2="300" y2="32"/><line x1="0" y1="46" x2="300" y2="46"/><line x1="0" y1="60" x2="300" y2="60"/><line x1="0" y1="74" x2="300" y2="74"/><line x1="0" y1="88" x2="300" y2="88"/><line x1="0" y1="102" x2="300" y2="102"/><line x1="0" y1="116" x2="300" y2="116"/><line x1="0" y1="130" x2="300" y2="130"/><line x1="0" y1="144" x2="300" y2="144"/><line x1="0" y1="158" x2="300" y2="158"/><line x1="0" y1="172" x2="300" y2="172"/><line x1="0" y1="186" x2="300" y2="186"/><line x1="0" y1="200" x2="300" y2="200"/></g>
<!-- step number ghost -->
<!-- two bodies: back-to-back, heads slightly bowed — the honest acknowledgment -->
<path d="M72 196 Q56 175 54 152 Q52 130 62 112 Q72 94 86 88 Q100 82 110 92 Q120 102 122 122 Q124 142 112 166 Q100 190 84 200Z" fill="#C9876A" opacity=".85" style="animation:breathe 5s ease-in-out infinite;transform-origin:88px 143px"/>
<g opacity=".2" stroke="#FDF6F0" stroke-width="2.5" stroke-linecap="round"><path d="M54 120 Q84 114 120 118"/><path d="M53 134 Q83 129 121 132"/><path d="M54 148 Q84 143 120 146"/></g>
<ellipse cx="86" cy="80" rx="18" ry="22" fill="none" stroke="#514543" stroke-width="1" transform="rotate(6 86 80)"/>
<path d="M74 68 Q82 58 88 56 Q94 54 98 62" fill="none" stroke="#514543" stroke-width=".9" stroke-linecap="round" opacity=".6"/>
<!-- head bowed: chin toward chest -->
<path d="M80 86 Q86 90 92 86" fill="none" stroke="#514543" stroke-width=".7" opacity=".35"/>
<!-- right body navy, also bowed -->
<path d="M178 196 Q194 175 196 152 Q198 130 188 112 Q178 94 164 88 Q150 82 140 92 Q130 102 128 122 Q126 142 138 166 Q150 190 166 200Z" fill="#7294D4" opacity=".85" style="animation:breathe 5s ease-in-out infinite;animation-delay:-2.5s;transform-origin:162px 143px"/>
<g opacity=".2" stroke="#FDF6F0" stroke-width="2" stroke-linecap="round"><path d="M130 118 Q158 113 194 116"/><path d="M128 132 Q157 127 195 130"/><path d="M129 146 Q157 141 194 144"/></g>
<ellipse cx="164" cy="80" rx="18" ry="22" fill="none" stroke="#514543" stroke-width="1" transform="rotate(-6 164 80)"/>
<path d="M152 68 Q160 58 166 56 Q172 54 176 62" fill="none" stroke="#514543" stroke-width=".9" stroke-linecap="round" opacity=".6"/>
<path d="M158 86 Q164 90 170 86" fill="none" stroke="#514543" stroke-width=".7" opacity=".35"/>
<!-- the gap: honest space between them -->
<path d="M122 130 Q150 126 128 130" fill="none" stroke="#E6D9D1" stroke-width="1" stroke-dasharray="2 4" opacity=".5"/>
</svg>
</body>
</html>
