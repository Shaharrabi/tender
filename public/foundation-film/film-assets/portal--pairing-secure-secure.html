<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Couple Portal · Pairing Secure+Secure</title>
<style>
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.95}}
@keyframes flicker{0%,100%{opacity:.6}45%{opacity:1}70%{opacity:.8}}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(3px,-3px)}}
@keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes unfurl{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
@keyframes glow{0%,100%{opacity:.07}50%{opacity:.25}}
@keyframes sway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(4deg)}}
@keyframes rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes expand{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
html,body{margin:0;padding:0;background:#FDF6F0;display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%}
svg{display:block;width:100%;max-width:600px;height:auto}
.ln line{stroke:#B9AAA0;stroke-width:.35;opacity:.06}
</style>
</head>
<body>
<svg viewBox="0 0 300 240" xmlns="http://www.w3.org/2000/svg">
<rect width="300" height="240" fill="#FDF6F0"/>
<g class="ln"><line x1="0" y1="18" x2="300" y2="18"/><line x1="0" y1="32" x2="300" y2="32"/><line x1="0" y1="46" x2="300" y2="46"/><line x1="0" y1="60" x2="300" y2="60"/><line x1="0" y1="74" x2="300" y2="74"/><line x1="0" y1="88" x2="300" y2="88"/><line x1="0" y1="102" x2="300" y2="102"/><line x1="0" y1="116" x2="300" y2="116"/><line x1="0" y1="130" x2="300" y2="130"/><line x1="0" y1="144" x2="300" y2="144"/><line x1="0" y1="158" x2="300" y2="158"/><line x1="0" y1="172" x2="300" y2="172"/><line x1="0" y1="186" x2="300" y2="186"/><line x1="0" y1="200" x2="300" y2="200"/><line x1="0" y1="214" x2="300" y2="214"/></g>

<!-- open full field: more lines, more alive, the grounded resonance -->
<g opacity=".25"><path d="M0 204 Q50 194 100 200 Q150 206 200 194 Q250 182 300 188" fill="none" stroke="#8FA8BC" stroke-width="1.6" stroke-linecap="round"/><path d="M0 216 Q50 208 102 213 Q152 218 200 208 Q250 198 300 202" fill="none" stroke="#8FA8BC" stroke-width="1.1" stroke-linecap="round" opacity=".7"/><path d="M0 226 Q50 220 102 224 Q152 228 200 220 Q250 212 300 215" fill="none" stroke="#8FA8BC" stroke-width=".7" stroke-linecap="round" opacity=".45"/></g>

<!-- LEFT body: sage, upright, open arms -->
<path d="M58 198 Q40 174 38 148 Q36 124 48 102 Q60 80 78 74 Q96 68 110 82 Q124 96 126 122 Q128 148 114 174 Q102 196 82 204Z" fill="#9DAA95" opacity=".85" style="animation:breathe 5.5s ease-in-out infinite;transform-origin:82px 138px"/>
<ellipse cx="80" cy="66" rx="20" ry="24" fill="none" stroke="#514543" stroke-width="1"/>
<path d="M66 54 Q76 44 82 42 Q88 40 92 48" fill="none" stroke="#514543" stroke-width=".9" stroke-linecap="round" opacity=".6"/>

<!-- RIGHT body: terracotta (second partner, both secure — different body color) -->
<path d="M242 198 Q260 174 262 148 Q264 124 252 102 Q240 80 222 74 Q204 68 190 82 Q176 96 174 122 Q172 148 186 174 Q198 196 218 204Z" fill="#C9876A" opacity=".82" style="animation:breathe 5.5s ease-in-out infinite;animation-delay:-2.5s;transform-origin:218px 138px"/>
<g opacity=".2" stroke="#FDF6F0" stroke-width="2.5" stroke-linecap="round"><path d="M176 118 Q206 112 260 116"/><path d="M174 132 Q205 127 261 130"/><path d="M175 146 Q205 141 260 144"/></g>
<ellipse cx="220" cy="66" rx="20" ry="24" fill="none" stroke="#514543" stroke-width="1"/>
<path d="M208 54 Q216 44 222 42 Q228 40 232 48" fill="none" stroke="#514543" stroke-width=".9" stroke-linecap="round" opacity=".6"/>

<!-- the grounded resonance: golden thread between them — not pulling, resting -->
<path d="M126 138 Q150 130 174 138" fill="none" stroke="#D4A843" stroke-width="1.2" stroke-dasharray="4 3" style="animation:pulse 3s ease-in-out infinite"/>
<!-- vine between them: fully leafed — the field is alive and tended -->
<g style="animation:float 4s ease-in-out infinite;transform-origin:150px 88px">
<line x1="150" y1="122" x2="150" y2="78" stroke="#514543" stroke-width="1" opacity=".45"/>
<path d="M150 78 Q154 68 158 78 Q154 88 150 78Z" fill="#7294D4" opacity=".75"/>
<path d="M150 78 Q146 70 142 78 Q146 86 150 78Z" fill="#7294D4" opacity=".55"/>
<path d="M146 86 Q138 82 136 88 Q142 90 146 86Z" fill="#9DAA95" opacity=".4"/>
<path d="M154 82 Q162 78 164 84 Q158 86 154 82Z" fill="#9DAA95" opacity=".38"/>
</g>

<!-- pairing badge -->
<rect x="90" y="18" width="120" height="16" rx="5" fill="#9DAA95" opacity=".2"/>
</svg>
</body>
</html>
