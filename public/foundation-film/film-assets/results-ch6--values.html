<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Results · Ch6 What Matters Most</title>
<style>
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.95}}
@keyframes flicker{0%,100%{opacity:.6}45%{opacity:1}70%{opacity:.8}}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(3px,-3px)}}
@keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes unfurl{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
@keyframes glow{0%,100%{opacity:.07}50%{opacity:.25}}
@keyframes sway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(4deg)}}
@keyframes rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes expand{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
html,body{margin:0;padding:0;background:#FDF6F0;display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%}
svg{display:block;width:100%;max-width:600px;height:auto}
.ln line{stroke:#B9AAA0;stroke-width:.35;opacity:.06}
</style>
</head>
<body>
<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
<rect width="300" height="200" fill="#FDF6F0"/>
<g class="ln"><line x1="0" y1="16" x2="300" y2="16"/><line x1="0" y1="30" x2="300" y2="30"/><line x1="0" y1="44" x2="300" y2="44"/><line x1="0" y1="58" x2="300" y2="58"/><line x1="0" y1="72" x2="300" y2="72"/><line x1="0" y1="86" x2="300" y2="86"/><line x1="0" y1="100" x2="300" y2="100"/><line x1="0" y1="114" x2="300" y2="114"/><line x1="0" y1="128" x2="300" y2="128"/><line x1="0" y1="142" x2="300" y2="142"/><line x1="0" y1="156" x2="300" y2="156"/><line x1="0" y1="170" x2="300" y2="170"/><line x1="0" y1="184" x2="300" y2="184"/></g>

<!-- MUSTARD body: standing tall, compass rose at chest, values as constellations -->
<path d="M94 182 Q74 158 72 132 Q70 108 82 86 Q94 64 112 58 Q130 52 144 66 Q158 80 160 106 Q162 132 148 160 Q134 184 114 190Z" fill="#D4A843" opacity=".8" style="animation:breathe 5.5s ease-in-out infinite;transform-origin:116px 124px"/>
<g opacity=".18" stroke="#FDF6F0" stroke-width="2.5" stroke-linecap="round">
<path d="M74 94 Q112 88 158 92"/><path d="M72 108 Q111 103 159 106"/><path d="M72 122 Q111 117 158 120"/><path d="M73 136 Q111 131 157 134"/>
</g>
<ellipse cx="116" cy="50" rx="20" ry="24" fill="none" stroke="#514543" stroke-width="1"/>
<path d="M102 38 Q112 28 118 26 Q124 24 128 32" fill="none" stroke="#514543" stroke-width=".9" stroke-linecap="round" opacity=".6"/>

<!-- compass at chest -->
<g style="animation:drift 6s ease-in-out infinite;transform-origin:116px 120px">
<circle cx="116" cy="120" r="20" fill="none" stroke="#FDF6F0" stroke-width=".8" opacity=".6"/>
<line x1="116" y1="100" x2="116" y2="140" stroke="#FDF6F0" stroke-width=".7" opacity=".5"/>
<line x1="96" y1="120" x2="136" y2="120" stroke="#FDF6F0" stroke-width=".7" opacity=".5"/>
<path d="M113 104 L116 100 L119 104" fill="none" stroke="#FDF6F0" stroke-width=".7" opacity=".7" stroke-linecap="round"/>
</g>

<!-- value constellations floating around: small dots connected -->
<g style="animation:float 4s ease-in-out infinite;transform-origin:196px 70px" opacity=".7">
<circle cx="192" cy="70" r="2.5" fill="#C9876A"/>
<circle cx="202" cy="60" r="2" fill="#C9876A"/>
<circle cx="210" cy="74" r="2" fill="#C9876A"/>
<line x1="192" y1="70" x2="202" y2="60" stroke="#C9876A" stroke-width=".6"/>
<line x1="202" y1="60" x2="210" y2="74" stroke="#C9876A" stroke-width=".6"/>
</g>
<g style="animation:float 4s ease-in-out infinite;animation-delay:-1.5s;transform-origin:220px 120px" opacity=".7">
<circle cx="218" cy="118" r="2.5" fill="#9DAA95"/>
<circle cx="230" cy="112" r="2" fill="#9DAA95"/>
<circle cx="228" cy="126" r="2" fill="#9DAA95"/>
<line x1="218" y1="118" x2="230" y2="112" stroke="#9DAA95" stroke-width=".6"/>
</g>
<g style="animation:float 4s ease-in-out infinite;animation-delay:-3s;transform-origin:196px 158px" opacity=".7">
<circle cx="194" cy="156" r="2.5" fill="#927585"/>
<circle cx="208" cy="162" r="2" fill="#927585"/>
<circle cx="200" cy="168" r="2" fill="#927585"/>
<line x1="194" y1="156" x2="208" y2="162" stroke="#927585" stroke-width=".6"/>
</g>

</svg>
</body>
</html>
