<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Results · Ch4 How You Hold Your Ground</title>
<style>
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.95}}
@keyframes flicker{0%,100%{opacity:.6}45%{opacity:1}70%{opacity:.8}}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(3px,-3px)}}
@keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes unfurl{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
@keyframes glow{0%,100%{opacity:.07}50%{opacity:.25}}
@keyframes sway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(4deg)}}
@keyframes rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes expand{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
html,body{margin:0;padding:0;background:#FDF6F0;display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%}
svg{display:block;width:100%;max-width:600px;height:auto}
.ln line{stroke:#B9AAA0;stroke-width:.35;opacity:.06}
</style>
</head>
<body>
<svg viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg">
<rect width="220" height="200" fill="#FDF6F0"/>
<g class="ln"><line x1="0" y1="16" x2="220" y2="16"/><line x1="0" y1="30" x2="220" y2="30"/><line x1="0" y1="44" x2="220" y2="44"/><line x1="0" y1="58" x2="220" y2="58"/><line x1="0" y1="72" x2="220" y2="72"/><line x1="0" y1="86" x2="220" y2="86"/><line x1="0" y1="100" x2="220" y2="100"/><line x1="0" y1="114" x2="220" y2="114"/><line x1="0" y1="128" x2="220" y2="128"/><line x1="0" y1="142" x2="220" y2="142"/><line x1="0" y1="156" x2="220" y2="156"/><line x1="0" y1="170" x2="220" y2="170"/><line x1="0" y1="184" x2="220" y2="184"/></g>

<!-- Differentiation spectrum: left=fused (two blobs merging), right=differentiated (two distinct with space) -->
<!-- FUSED side: two bodies bleeding into each other, colours mixing -->
<path d="M24 168 Q14 150 14 130 Q14 112 22 98 Q30 84 40 80 Q50 76 56 84 Q62 92 62 112 Q62 132 54 150 Q48 164 38 170Z" fill="#C9876A" opacity=".65"/>
<path d="M46 168 Q36 150 36 130 Q36 112 44 98 Q52 84 62 80 Q72 76 78 84 Q84 92 84 112 Q84 132 76 150 Q70 164 60 170Z" fill="#7294D4" opacity=".55"/>
<!-- overlap zone glow: no clear border between them -->
<ellipse cx="54" cy="128" rx="12" ry="30" fill="#B9AAA0" opacity=".1"/>
<!-- DIFFERENTIATED side: same two bodies, clear space, both complete -->
<path d="M122 168 Q110 148 108 126 Q106 106 116 90 Q126 74 138 70 Q150 66 158 78 Q166 90 166 114 Q166 138 154 160 Q146 174 134 174Z" fill="#C9876A" opacity=".85" style="animation:breathe 5s ease-in-out infinite;transform-origin:137px 120px"/>
<path d="M168 166 Q158 148 156 128 Q154 110 162 96 Q170 82 182 78 Q194 74 200 86 Q206 98 206 120 Q206 142 196 160 Q188 172 178 172Z" fill="#7294D4" opacity=".82" style="animation:breathe 5s ease-in-out infinite;animation-delay:-2.5s;transform-origin:181px 125px"/>
<g opacity=".2" stroke="#FDF6F0" stroke-width="2" stroke-linecap="round"><path d="M156 106 Q172 101 204 104"/><path d="M155 118 Q171 113 205 116"/></g>
<!-- space between them: the healthy gap -->
<line x1="165" y1="124" x2="157" y2="124" stroke="#D6CEBF" stroke-width="1.2" opacity=".5"/>
<!-- spectrum arrow -->
<line x1="88" y1="124" x2="104" y2="124" stroke="#B9AAA0" stroke-width=".7" opacity=".4"/>
<path d="M100 121 L104 124 L100 127" fill="none" stroke="#B9AAA0" stroke-width=".7" opacity=".4"/>

</svg>
</body>
</html>
