<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Results · Ch3 How You Read the Room</title>
<style>
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.95}}
@keyframes flicker{0%,100%{opacity:.6}45%{opacity:1}70%{opacity:.8}}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(3px,-3px)}}
@keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes unfurl{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
@keyframes glow{0%,100%{opacity:.07}50%{opacity:.25}}
@keyframes sway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(4deg)}}
@keyframes rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes expand{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
html,body{margin:0;padding:0;background:#FDF6F0;display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%}
svg{display:block;width:100%;max-width:600px;height:auto}
.ln line{stroke:#B9AAA0;stroke-width:.35;opacity:.06}
</style>
</head>
<body>
<svg viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg">
<rect width="220" height="200" fill="#FDF6F0"/>
<g class="ln"><line x1="0" y1="16" x2="220" y2="16"/><line x1="0" y1="30" x2="220" y2="30"/><line x1="0" y1="44" x2="220" y2="44"/><line x1="0" y1="58" x2="220" y2="58"/><line x1="0" y1="72" x2="220" y2="72"/><line x1="0" y1="86" x2="220" y2="86"/><line x1="0" y1="100" x2="220" y2="100"/><line x1="0" y1="114" x2="220" y2="114"/><line x1="0" y1="128" x2="220" y2="128"/><line x1="0" y1="142" x2="220" y2="142"/><line x1="0" y1="156" x2="220" y2="156"/><line x1="0" y1="170" x2="220" y2="170"/><line x1="0" y1="184" x2="220" y2="184"/></g>

<!-- SAGE body: wide, open — with 4 floating EI petals around it like a flower -->
<path d="M62 180 Q46 160 44 136 Q42 114 54 94 Q66 74 82 68 Q98 62 112 74 Q126 86 128 110 Q130 134 116 160 Q102 182 82 186Z" fill="#9DAA95" opacity=".8" style="animation:breathe 5s ease-in-out infinite;transform-origin:86px 124px"/>
<ellipse cx="84" cy="60" rx="18" ry="22" fill="none" stroke="#514543" stroke-width=".9"/>
<path d="M72 48 Q80 40 86 38 Q92 36 96 44" fill="none" stroke="#514543" stroke-width=".9" stroke-linecap="round" opacity=".6"/>

<!-- 4 EI petal zones: perceiving, using, understanding, managing -->
<!-- PERCEIVING: top, blush -->
<g style="animation:float 3.5s ease-in-out infinite;transform-origin:84px 30px">
<ellipse cx="84" cy="30" rx="22" ry="16" fill="#E3AFB7" opacity=".2"/>
</g>
<!-- USING: right, mustard -->
<g style="animation:float 3.5s ease-in-out infinite;animation-delay:-.9s;transform-origin:168px 88px">
<ellipse cx="168" cy="88" rx="30" ry="16" fill="#D4A843" opacity=".18" transform="rotate(-15 168 88)"/>
</g>
<!-- UNDERSTANDING: bottom, dusty blue -->
<g style="animation:float 3.5s ease-in-out infinite;animation-delay:-1.8s;transform-origin:84px 170px">
<ellipse cx="84" cy="170" rx="22" ry="14" fill="#8FA8BC" opacity=".22"/>
</g>
<!-- MANAGING: left, plum -->
<g style="animation:float 3.5s ease-in-out infinite;animation-delay:-2.7s;transform-origin:18px 124px">
<ellipse cx="20" cy="124" rx="14" ry="22" fill="#927585" opacity=".18"/>
</g>

</svg>
</body>
</html>
