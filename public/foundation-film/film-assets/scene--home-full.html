<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scene · Home full-size</title>
<style>
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.95}}
@keyframes flicker{0%,100%{opacity:.6}45%{opacity:1}70%{opacity:.8}}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(3px,-3px)}}
@keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes unfurl{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
@keyframes glow{0%,100%{opacity:.07}50%{opacity:.25}}
@keyframes sway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(4deg)}}
@keyframes rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes expand{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
html,body{margin:0;padding:0;background:#FDF6F0;display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%}
svg{display:block;width:100%;max-width:600px;height:auto}
.ln line{stroke:#B9AAA0;stroke-width:.35;opacity:.06}
</style>
</head>
<body>
<svg viewBox="0 0 480 340" xmlns="http://www.w3.org/2000/svg">
<rect width="480" height="340" fill="#FDF6F0"/>
<g class="lines"><line x1="0" y1="24" x2="480" y2="24"/><line x1="0" y1="42" x2="480" y2="42"/><line x1="0" y1="60" x2="480" y2="60"/><line x1="0" y1="78" x2="480" y2="78"/><line x1="0" y1="96" x2="480" y2="96"/><line x1="0" y1="114" x2="480" y2="114"/><line x1="0" y1="132" x2="480" y2="132"/><line x1="0" y1="150" x2="480" y2="150"/><line x1="0" y1="168" x2="480" y2="168"/><line x1="0" y1="186" x2="480" y2="186"/><line x1="0" y1="204" x2="480" y2="204"/><line x1="0" y1="222" x2="480" y2="222"/><line x1="0" y1="240" x2="480" y2="240"/><line x1="0" y1="258" x2="480" y2="258"/><line x1="0" y1="276" x2="480" y2="276"/><line x1="0" y1="294" x2="480" y2="294"/><line x1="0" y1="312" x2="480" y2="312"/></g>

<!-- open field: not a shape, a breath -->
<g opacity="0.25">
<path d="M30 252 Q100 234 180 244 Q260 254 340 238 Q400 225 460 230" fill="none" stroke="#8FA8BC" stroke-width="1.8" stroke-linecap="round"/>
<path d="M20 268 Q95 252 176 260 Q258 268 338 253 Q402 240 462 245" fill="none" stroke="#8FA8BC" stroke-width="1.3" stroke-linecap="round" opacity="0.75"/>
<path d="M25 282 Q98 268 178 274 Q260 280 340 266 Q403 254 462 258" fill="none" stroke="#8FA8BC" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
<path d="M28 295 Q100 282 180 287 Q262 292 340 279 Q403 268 462 272" fill="none" stroke="#8FA8BC" stroke-width="0.6" stroke-linecap="round" opacity="0.3"/>
</g>

<!-- LEFT BODY: terracotta, abstract pour, heavy stripes -->
<path d="M68 318 Q46 290 44 260 Q42 232 54 205 Q66 178 86 167 Q106 156 120 166 Q134 176 136 202 Q138 228 126 262 Q114 296 98 320Z" fill="#C9876A" opacity="0.87" style="animation:breathe 5s ease-in-out infinite;transform-origin:90px 242px"/>
<g opacity="0.2" stroke="#FDF6F0" stroke-width="2.5" stroke-linecap="round">
<path d="M48 212 Q82 204 132 210"/><path d="M46 228 Q80 221 134 226"/><path d="M45 244 Q80 238 134 242"/><path d="M46 260 Q80 254 132 258"/><path d="M48 274 Q80 269 128 273"/>
</g>
<!-- head left -->
<ellipse cx="102" cy="150" rx="26" ry="31" fill="none" stroke="#514543" stroke-width="1.1" transform="rotate(7 102 150)"/>
<path d="M82 133 Q93 120 104 117 Q115 114 123 125" fill="none" stroke="#514543" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
<circle cx="110" cy="152" r="2" fill="#514543" opacity="0.35"/>
<rect x="97" y="178" width="8" height="10" fill="#C9876A" rx="3"/>

<!-- RIGHT BODY: navy, denser stripes, leaning in -->
<path d="M360 316 Q338 288 336 258 Q334 230 346 203 Q358 176 378 165 Q398 154 412 164 Q426 174 428 200 Q430 226 418 260 Q406 294 390 318Z" fill="#7294D4" opacity="0.87" style="animation:breathe 5s ease-in-out infinite;animation-delay:-2.5s;transform-origin:382px 240px"/>
<g opacity="0.22" stroke="#FDF6F0" stroke-width="2" stroke-linecap="round">
<path d="M338 206 Q368 199 426 204"/><path d="M336 220 Q366 214 428 218"/><path d="M335 234 Q365 228 428 232"/><path d="M336 248 Q365 243 426 246"/><path d="M337 262 Q366 257 424 260"/><path d="M339 276 Q367 272 420 274"/>
</g>
<ellipse cx="395" cy="148" rx="26" ry="31" fill="none" stroke="#514543" stroke-width="1.1" transform="rotate(-7 395 148)"/>
<path d="M376 131 Q386 118 397 115 Q408 112 416 123" fill="none" stroke="#514543" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
<circle cx="385" cy="150" r="2" fill="#514543" opacity="0.35"/>
<rect x="390" y="176" width="8" height="10" fill="#7294D4" rx="3"/>

<!-- vine arc -->
<path d="M136 178 Q200 138 240 122 Q280 106 346 136 Q362 148 372 166" fill="none" stroke="#514543" stroke-width="1.4" stroke-linecap="round" opacity="0.6" stroke-dasharray="380" style="animation:unfurl 3s ease-out forwards"/>
<!-- leaf -->
<g style="animation:float 4s ease-in-out infinite;transform-origin:240px 90px">
<path d="M240 120 Q243 108 246 98 Q248 110 245 120Z" fill="#7294D4" opacity="0.8"/>
<path d="M240 120 Q237 110 234 100 Q236 112 239 120Z" fill="#7294D4" opacity="0.56"/>
<line x1="240" y1="98" x2="240" y2="120" stroke="#514543" stroke-width="0.8" opacity="0.45"/>
<path d="M237 108 Q230 105 229 110 Q234 112 237 108Z" fill="#7294D4" opacity="0.4"/>
</g>
<!-- breath dashes -->
<line x1="134" y1="162" x2="184" y2="138" stroke="#514543" stroke-width="0.75" stroke-dasharray="3 5" opacity="0.35" style="animation:pulse 3s ease-in-out infinite"/>
<line x1="368" y1="160" x2="318" y2="136" stroke="#514543" stroke-width="0.75" stroke-dasharray="3 5" opacity="0.35" style="animation:pulse 3s ease-in-out infinite;animation-delay:-1.5s"/>

</svg>
</body>
</html>
