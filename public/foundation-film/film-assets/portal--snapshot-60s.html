<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Couple Portal · 60-Second Snapshot</title>
<style>
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.95}}
@keyframes flicker{0%,100%{opacity:.6}45%{opacity:1}70%{opacity:.8}}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(3px,-3px)}}
@keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes unfurl{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
@keyframes glow{0%,100%{opacity:.07}50%{opacity:.25}}
@keyframes sway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(4deg)}}
@keyframes rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes expand{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
html,body{margin:0;padding:0;background:#FDF6F0;display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%}
svg{display:block;width:100%;max-width:600px;height:auto}
.ln line{stroke:#B9AAA0;stroke-width:.35;opacity:.06}
</style>
</head>
<body>
<svg viewBox="0 0 300 240" xmlns="http://www.w3.org/2000/svg">
<rect width="300" height="240" fill="#FDF6F0"/>
<g class="ln"><line x1="0" y1="18" x2="300" y2="18"/><line x1="0" y1="32" x2="300" y2="32"/><line x1="0" y1="46" x2="300" y2="46"/><line x1="0" y1="60" x2="300" y2="60"/><line x1="0" y1="74" x2="300" y2="74"/><line x1="0" y1="88" x2="300" y2="88"/><line x1="0" y1="102" x2="300" y2="102"/><line x1="0" y1="116" x2="300" y2="116"/><line x1="0" y1="130" x2="300" y2="130"/><line x1="0" y1="144" x2="300" y2="144"/><line x1="0" y1="158" x2="300" y2="158"/><line x1="0" y1="172" x2="300" y2="172"/><line x1="0" y1="186" x2="300" y2="186"/><line x1="0" y1="200" x2="300" y2="200"/><line x1="0" y1="214" x2="300" y2="214"/></g>

<!-- twin orb auras — the couple field -->
<circle cx="104" cy="110" r="56" fill="none" stroke="#E3AFB7" stroke-width=".6" opacity=".2" style="animation:breathe 5s ease-in-out infinite"/>
<circle cx="104" cy="110" r="42" fill="#E3AFB7" opacity=".07" style="animation:breathe 5s ease-in-out infinite;animation-delay:-1s"/>
<circle cx="196" cy="110" r="56" fill="none" stroke="#7294D4" stroke-width=".6" opacity=".2" style="animation:breathe 5s ease-in-out infinite;animation-delay:-2.5s"/>
<circle cx="196" cy="110" r="42" fill="#7294D4" opacity=".06" style="animation:breathe 5s ease-in-out infinite;animation-delay:-3.5s"/>
<!-- vesica overlap -->
<path d="M150 58 Q170 80 170 110 Q170 140 150 162 Q130 140 130 110 Q130 80 150 58Z" fill="#D4A843" opacity=".1" style="animation:glow 4s ease-in-out infinite"/>
<path d="M150 58 Q170 80 170 110 Q170 140 150 162 Q130 140 130 110 Q130 80 150 58Z" fill="none" stroke="#D4A843" stroke-width=".8" opacity=".45" style="animation:pulse 3s ease-in-out infinite"/>

<!-- vitality/resonance/coping snapshot: three mini orbs below vesica -->
<circle cx="126" cy="182" r="10" fill="#D4A843" opacity=".6" style="animation:pulse 2.5s ease-in-out infinite"/>
<circle cx="150" cy="178" r="14" fill="#9DAA95" opacity=".55" style="animation:pulse 2.5s ease-in-out infinite;animation-delay:-.8s"/>
<circle cx="174" cy="182" r="10" fill="#8FA8BC" opacity=".5" style="animation:pulse 2.5s ease-in-out infinite;animation-delay:-1.5s"/>
<!-- shared strengths top bar -->
<rect x="20" y="20" width="260" height="16" rx="5" fill="#9DAA95" opacity=".15"/>
<!-- story together: two short lines -->
</svg>
</body>
</html>
