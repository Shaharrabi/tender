<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Results · Ch5 How You Navigate Conflict</title>
<style>
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.95}}
@keyframes flicker{0%,100%{opacity:.6}45%{opacity:1}70%{opacity:.8}}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(3px,-3px)}}
@keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes unfurl{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
@keyframes glow{0%,100%{opacity:.07}50%{opacity:.25}}
@keyframes sway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(4deg)}}
@keyframes rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes expand{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
html,body{margin:0;padding:0;background:#FDF6F0;display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%}
svg{display:block;width:100%;max-width:600px;height:auto}
.ln line{stroke:#B9AAA0;stroke-width:.35;opacity:.06}
</style>
</head>
<body>
<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
<rect width="300" height="200" fill="#FDF6F0"/>
<g class="ln"><line x1="0" y1="16" x2="300" y2="16"/><line x1="0" y1="30" x2="300" y2="30"/><line x1="0" y1="44" x2="300" y2="44"/><line x1="0" y1="58" x2="300" y2="58"/><line x1="0" y1="72" x2="300" y2="72"/><line x1="0" y1="86" x2="300" y2="86"/><line x1="0" y1="100" x2="300" y2="100"/><line x1="0" y1="114" x2="300" y2="114"/><line x1="0" y1="128" x2="300" y2="128"/><line x1="0" y1="142" x2="300" y2="142"/><line x1="0" y1="156" x2="300" y2="156"/><line x1="0" y1="170" x2="300" y2="170"/><line x1="0" y1="184" x2="300" y2="184"/></g>

<!-- Conflict dynamic: two bodies in tension, the four horsemen above them -->
<!-- BLUSH body left: criticism pose — leaning forward with pointing arm -->
<path d="M56 178 Q40 158 38 136 Q36 116 46 98 Q56 80 70 74 Q84 68 94 80 Q104 92 106 114 Q108 136 96 160 Q86 178 72 184Z" fill="#E3AFB7" opacity=".82" style="animation:breathe 4s ease-in-out infinite;transform-origin:72px 126px"/>
<ellipse cx="72" cy="66" rx="18" ry="22" fill="none" stroke="#514543" stroke-width=".9" transform="rotate(5 72 66)"/>
<!-- pointed arm: criticism -->
<!-- NAVY body right: stone-walling pose — arms crossed, turned away -->
<path d="M196 178 Q214 158 216 136 Q218 116 208 98 Q198 80 184 74 Q170 68 160 80 Q150 92 148 114 Q146 136 158 160 Q168 178 182 184Z" fill="#7294D4" opacity=".82"/>
<g opacity=".2" stroke="#FDF6F0" stroke-width="2" stroke-linecap="round"><path d="M150 112 Q174 107 214 110"/><path d="M149 124 Q173 119 215 122"/></g>
<ellipse cx="182" cy="66" rx="18" ry="22" fill="none" stroke="#514543" stroke-width=".9" transform="rotate(-5 182 66)"/>
<!-- arms crossed: stonewalling -->

<!-- THE FOUR HORSEMEN: floating above the conflict space -->
<g opacity=".5">
<rect x="120" y="16" width="60" height="14" rx="4" fill="#E3AFB7" opacity=".25"/>
<rect x="120" y="34" width="60" height="14" rx="4" fill="#8FA8BC" opacity=".2"/>
<rect x="120" y="52" width="60" height="14" rx="4" fill="#D4A843" opacity=".2"/>
<rect x="120" y="70" width="60" height="14" rx="4" fill="#E3AFB7" opacity=".18"/>
</g>

<!-- ANTIDOTES: right side -->
<g opacity=".45">
</g>

</svg>
</body>
</html>
