<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wild · Inner Rings IFS Architecture (dark navy)</title>
<style>
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.95}}
@keyframes flicker{0%,100%{opacity:.6}45%{opacity:1}70%{opacity:.8}}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(3px,-3px)}}
@keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes unfurl{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
@keyframes glow{0%,100%{opacity:.07}50%{opacity:.25}}
@keyframes sway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(4deg)}}
@keyframes rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes expand{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
html,body{margin:0;padding:0;background:#FFF8F2;display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%}
svg{display:block;width:100%;max-width:600px;height:auto}
.ln line{stroke:#B9AAA0;stroke-width:.35;opacity:.06}
</style>
</head>
<body>
<svg viewBox="0 0 280 240" xmlns="http://www.w3.org/2000/svg">
<rect width="280" height="240" fill="#FFF8F2"/>
<g opacity=".05" stroke="#8FA8BC" stroke-width=".4"><line x1="0" y1="20" x2="280" y2="20"/><line x1="0" y1="36" x2="280" y2="36"/><line x1="0" y1="52" x2="280" y2="52"/><line x1="0" y1="68" x2="280" y2="68"/><line x1="0" y1="84" x2="280" y2="84"/><line x1="0" y1="100" x2="280" y2="100"/><line x1="0" y1="116" x2="280" y2="116"/><line x1="0" y1="132" x2="280" y2="132"/><line x1="0" y1="148" x2="280" y2="148"/><line x1="0" y1="164" x2="280" y2="164"/><line x1="0" y1="180" x2="280" y2="180"/><line x1="0" y1="196" x2="280" y2="196"/><line x1="0" y1="212" x2="280" y2="212"/></g>
<!-- body outline only: see-through, the rings inside are the subject -->
<path d="M92 210 Q70 184 68 156 Q66 130 78 106 Q90 82 110 74 Q130 66 148 80 Q166 94 168 122 Q170 150 156 178 Q144 202 122 214Z" fill="none" stroke="#8FA8BC" stroke-width="1.2" opacity=".4"/>
<ellipse cx="122" cy="66" rx="22" ry="26" fill="none" stroke="#8FA8BC" stroke-width=".9" opacity=".4"/>
<!-- concentric rings INSIDE: tree rings, visible through the transparent body -->
<ellipse cx="120" cy="148" rx="8" ry="10" fill="none" stroke="#D4A843" stroke-width="1.2" style="animation:pulse 2s ease-in-out infinite"/>
<ellipse cx="120" cy="148" rx="18" ry="22" fill="none" stroke="#D4A843" stroke-width=".9" opacity=".7" style="animation:pulse 2.5s ease-in-out infinite;animation-delay:-.5s"/>
<ellipse cx="120" cy="148" rx="30" ry="36" fill="none" stroke="#E3AFB7" stroke-width=".7" opacity=".5" style="animation:pulse 2.5s ease-in-out infinite;animation-delay:-1s"/>
<ellipse cx="120" cy="148" rx="44" ry="52" fill="none" stroke="#8FA8BC" stroke-width=".5" opacity=".35" style="animation:pulse 2.5s ease-in-out infinite;animation-delay:-1.5s"/>
<ellipse cx="120" cy="148" rx="60" ry="70" fill="none" stroke="#8FA8BC" stroke-width=".4" opacity=".2" style="animation:pulse 2.5s ease-in-out infinite;animation-delay:-2s"/>
<!-- golden core: Self -->
<circle cx="120" cy="148" r="4" fill="#D4A843" opacity=".9" style="animation:pulse 2s ease-in-out infinite"/>
<!-- ring labels on the right -->
</svg>
</body>
</html>
