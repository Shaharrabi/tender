<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wild · Spiral of Growth (dark plum + 12 step dots)</title>
<style>
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.95}}
@keyframes flicker{0%,100%{opacity:.6}45%{opacity:1}70%{opacity:.8}}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(3px,-3px)}}
@keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes unfurl{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
@keyframes glow{0%,100%{opacity:.07}50%{opacity:.25}}
@keyframes sway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(4deg)}}
@keyframes rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes expand{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
html,body{margin:0;padding:0;background:#FFF8F2;display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%}
svg{display:block;width:100%;max-width:600px;height:auto}
.ln line{stroke:#B9AAA0;stroke-width:.35;opacity:.06}
</style>
</head>
<body>
<svg viewBox="0 0 280 240" xmlns="http://www.w3.org/2000/svg">
<rect width="280" height="240" fill="#FFF8F2"/>
<g opacity=".05" stroke="#927585" stroke-width=".4"><line x1="0" y1="20" x2="280" y2="20"/><line x1="0" y1="36" x2="280" y2="36"/><line x1="0" y1="52" x2="280" y2="52"/><line x1="0" y1="68" x2="280" y2="68"/><line x1="0" y1="84" x2="280" y2="84"/><line x1="0" y1="100" x2="280" y2="100"/><line x1="0" y1="116" x2="280" y2="116"/><line x1="0" y1="132" x2="280" y2="132"/><line x1="0" y1="148" x2="280" y2="148"/><line x1="0" y1="164" x2="280" y2="164"/><line x1="0" y1="180" x2="280" y2="180"/><line x1="0" y1="196" x2="280" y2="196"/><line x1="0" y1="212" x2="280" y2="212"/></g>
<!-- Golden spiral: uncoiling upward -->
<path d="M140 220 Q165 215 172 200 Q182 180 170 162 Q158 144 140 142 Q122 140 110 154 Q98 168 102 188 Q106 210 128 222 Q152 232 174 224 Q196 215 204 196 Q214 174 204 152 Q194 130 172 118 Q150 106 126 108 Q100 110 84 128 Q66 148 66 172 Q66 200 84 218" fill="none" stroke="#D4A843" stroke-width="1.5" opacity=".6" stroke-dasharray="600" style="animation:unfurl 5s ease-out forwards"/>
<!-- small body at the base of the spiral: beginning of the journey -->
<path d="M122 218 Q114 210 112 200 Q110 190 116 184 Q122 178 128 182 Q134 186 136 196 Q138 206 132 214 Q128 220 124 220Z" fill="#E3AFB7" opacity=".8" style="animation:breathe 5s ease-in-out infinite;transform-origin:124px 200px"/>
<ellipse cx="124" cy="178" rx="11" ry="13" fill="none" stroke="#FDF6F0" stroke-width=".8" opacity=".5"/>
<!-- 12 step dots on the spiral -->
<g opacity=".6">
<circle cx="140" cy="220" r="2.5" fill="#D4A843"/>
<circle cx="162" cy="208" r="2" fill="#D4A843"/>
<circle cx="172" cy="192" r="2" fill="#D4A843"/>
<circle cx="166" cy="175" r="2" fill="#8FA8BC"/>
<circle cx="150" cy="162" r="2" fill="#8FA8BC"/>
<circle cx="132" cy="158" r="2" fill="#8FA8BC"/>
<circle cx="116" cy="164" r="2" fill="#9DAA95"/>
<circle cx="108" cy="178" r="2" fill="#9DAA95"/>
<circle cx="110" cy="196" r="2" fill="#9DAA95"/>
</g>
<!-- step 12: bright dot at the crown -->
<g style="animation:pulse 2s ease-in-out infinite;transform-origin:84px 140px">
<circle cx="84" cy="140" r="6" fill="#D4A843" opacity=".7"/>
<circle cx="84" cy="140" r="12" fill="none" stroke="#D4A843" stroke-width=".5" opacity=".3"/>
</g>
</svg>
</body>
</html>
