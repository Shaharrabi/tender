<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scene · IFS Parts Map</title>
<style>
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.95}}
@keyframes flicker{0%,100%{opacity:.6}45%{opacity:1}70%{opacity:.8}}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(3px,-3px)}}
@keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes unfurl{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
@keyframes glow{0%,100%{opacity:.07}50%{opacity:.25}}
@keyframes sway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(4deg)}}
@keyframes rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes expand{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
html,body{margin:0;padding:0;background:#FDF6F0;display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%}
svg{display:block;width:100%;max-width:600px;height:auto}
.ln line{stroke:#B9AAA0;stroke-width:.35;opacity:.06}
</style>
</head>
<body>
<svg viewBox="0 0 480 340" xmlns="http://www.w3.org/2000/svg">
<rect width="480" height="340" fill="#FDF6F0"/>
<g class="lines"><line x1="0" y1="24" x2="480" y2="24"/><line x1="0" y1="42" x2="480" y2="42"/><line x1="0" y1="60" x2="480" y2="60"/><line x1="0" y1="78" x2="480" y2="78"/><line x1="0" y1="96" x2="480" y2="96"/><line x1="0" y1="114" x2="480" y2="114"/><line x1="0" y1="132" x2="480" y2="132"/><line x1="0" y1="150" x2="480" y2="150"/><line x1="0" y1="168" x2="480" y2="168"/><line x1="0" y1="186" x2="480" y2="186"/><line x1="0" y1="204" x2="480" y2="204"/><line x1="0" y1="222" x2="480" y2="222"/><line x1="0" y1="240" x2="480" y2="240"/><line x1="0" y1="258" x2="480" y2="258"/><line x1="0" y1="276" x2="480" y2="276"/><line x1="0" y1="294" x2="480" y2="294"/></g>

<!-- orbit ring -->
<circle cx="200" cy="185" r="120" fill="none" stroke="#D6CEBF" stroke-width="0.8" stroke-dasharray="4 5" opacity="0.5"/>

<!-- Self body — both colors, merged -->
<path d="M152 296 Q132 270 130 240 Q128 212 142 188 Q156 164 176 157 Q196 150 208 164 Q220 178 222 204 Q224 230 210 260 Q196 290 178 300Z" fill="#C9876A" opacity="0.82" style="animation:breathe 5s ease-in-out infinite;transform-origin:176px 228px"/>
<g opacity="0.18" stroke="#7294D4" stroke-width="3" stroke-linecap="round">
<path d="M134 200 Q166 193 220 198"/><path d="M132 216 Q165 210 221 214"/><path d="M133 232 Q165 226 220 230"/>
</g>
<ellipse cx="176" cy="144" rx="24" ry="28" fill="none" stroke="#514543" stroke-width="1.1"/>
<path d="M157 130 Q168 118 178 115 Q188 112 194 122" fill="none" stroke="#514543" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
<!-- SELF dot: golden center in torso -->
<circle cx="176" cy="228" r="4" fill="#D4A843" opacity="0.85" style="animation:pulse 2s ease-in-out infinite"/>

<!-- inner rings inside body -->
<ellipse cx="176" cy="228" rx="12" ry="16" fill="none" stroke="#D4A843" stroke-width="0.8" style="animation:pulse 2.5s ease-in-out infinite;animation-delay:-0.5s"/>
<ellipse cx="176" cy="228" rx="24" ry="32" fill="none" stroke="#D4A843" stroke-width="0.55" opacity="0.5" style="animation:pulse 2.5s ease-in-out infinite;animation-delay:-1.2s"/>

<!-- orbiting PARTS: labeled, colored -->
<g style="transform-origin:200px 185px;animation:orbit 9s linear infinite">
<circle cx="200" cy="65" r="16" fill="none" stroke="#C9876A" stroke-width="0.8" opacity="0.5"/>
</g>
<g style="transform-origin:200px 185px;animation:orbit 9s linear infinite;animation-delay:-3s">
<circle cx="200" cy="65" r="16" fill="none" stroke="#8FA8BC" stroke-width="0.8" opacity="0.5"/>
</g>
<g style="transform-origin:200px 185px;animation:orbit 9s linear infinite;animation-delay:-6s">
<circle cx="200" cy="65" r="16" fill="none" stroke="#9DAA95" stroke-width="0.8" opacity="0.5"/>
</g>

<!-- right: SELF quality labels -->
<g opacity="0.65">
</g>

</svg>
</body>
</html>
